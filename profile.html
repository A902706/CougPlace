<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CougPlace - Profile</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="marketplace.html">CougPlace</a>
      <div class="collapse navbar-collapse show">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="marketplace.html">Marketplace</a></li>
          <li class="nav-item"><a class="nav-link" href="search-results.html">Search Results</a></li>
          <li class="nav-item"><a class="nav-link active" href="profile.html">Profile</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm border-0 profile-card">
          <div class="card-body p-4">
            <div class="d-flex align-items-center gap-4 flex-wrap">
              <img src="https://via.placeholder.com/120" class="rounded-circle profile-img" alt="Profile Picture">
              <div>
                <h2 class="fw-bold mb-1">Bucky Student</h2>
                <p class="text-muted mb-1">Verified WSU Student</p>
                <p class="mb-0">bucky@wsu.edu</p>
              </div>
            </div>

            <hr class="my-4">

            <div class="row g-3">
              <div class="col-md-6">
                <h6 class="text-muted">Phone</h6>
                <p>(555) 123-4567</p>
              </div>
              <div class="col-md-6">
                <h6 class="text-muted">Campus</h6>
                <p>Pullman</p>
              </div>
              <div class="col-12">
                <h6 class="text-muted">Bio</h6>
                <p>WSU student using CougPlace to buy and sell school and dorm items on campus.</p>
              </div>
            </div>

            <div class="mt-4 d-flex gap-2">
              <button class="btn btn-primary-custom">Edit Profile</button>
              <button class="btn btn-outline-secondary">Change Password</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 text-center footer-custom">
    <div class="container">
      <p class="mb-0">© 2026 CougPlace</p>
    </div>
  </footer>
</body>
</html>
