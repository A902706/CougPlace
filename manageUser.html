<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Users</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">CougPlace Admin</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main content -->
    <div class="container">
        <h1 class="mb-4">Manage Users</h1>

        <!-- THis is the Search bar -->
        <div class="row mb-3">
            <div class="col-md-6"> <!--Take col for mediam screen and take 6 columns  out of 12 -->
                <input type="text" class="form-control" id="searchUser" placeholder="Search by name, email, or username">
            </div>
        </div>

        <!-- Users table -->
        <div class="table-responsive">
            <table class="table table-striped table-hover">
                <thead class="table-dark">
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Username</th>
                        <th scope="col">Email</th>
                        <th scope="col">Status</th>
                        <th scope="col">Listings</th>
                        <th scope="col">Actions</th>
                    </tr>
                </thead>
                <tbody>
                    <!--Temp row showing a sample user -->
                    <tr>
                        <th scope="row">1</th>
                        <td>Andres</td>
                        <td>andres.sanchez1@wsu.edu</td>
                        <td>Active</td>
                        <td>3</td>
                        <td>
                            <button class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#actionModal" data-action="Suspend" data-user="jdoe">Suspend</button>
                            <button class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#actionModal" data-action="Ban" data-user="jdoe">Ban</button>
                            <button class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#actionModal" data-action="Unban" data-user="jdoe">Unban</button>
                        </td>
                    </tr>
                    <!-- Add more rows as needed Will be done with JS later -->
                </tbody>
            </table>
        </div>
    </div>

    <!-- Action Confirmation Modal -->
    <div class="modal fade" id="actionModal" tabindex="-1" aria-labelledby="actionModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="actionModalLabel">Confirm Action</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    Are you sure you want to <span id="modalAction"></span> the account <strong id="modalUser"></strong>?
                    <div class="mt-3">
                        <label for="reasonInput" class="form-label">Reason (required):</label>
                        <textarea class="form-control" id="reasonInput" rows="2" placeholder="Enter reason for this action"></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary" id="confirmActionBtn">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Code for modal functionality will be here-->
</body>
</html>
