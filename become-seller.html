<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CougPlace - Become a Seller</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-nav">
  <div class="container">
    <a class="navbar-brand fw-bold" href="marketplace.html">CougPlace</a>

    <div class="collapse navbar-collapse show">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="marketplace.html">Marketplace</a></li>
        <li class="nav-item"><a class="nav-link active" href="become-seller.html">Become a Seller</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-7">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h2 class="fw-bold mb-3">Create Seller Profile</h2>
          <p class="text-muted mb-4">
            Activate your seller account to start posting listings and managing sales on CougPlace.
          </p>

          <form>
            <div class="mb-3">
              <label class="form-label">Full Name</label>
              <input type="text" class="form-control" placeholder="Enter your full name">
            </div>

            <div class="mb-3">
              <label class="form-label">WSU Email</label>
              <input type="email" class="form-control" placeholder="yourname@wsu.edu">
            </div>

            <div class="mb-3">
              <label class="form-label">Preferred Pickup Area</label>
              <input type="text" class="form-control" placeholder="Ex: CUB, Library, Spark">
            </div>

            <div class="mb-3">
              <label class="form-label">Seller Bio</label>
              <textarea class="form-control" rows="3" placeholder="Optional short seller description"></textarea>
            </div>

            <div class="form-check mb-4">
              <input class="form-check-input" type="checkbox" id="rulesCheck">
              <label class="form-check-label" for="rulesCheck">
                I agree to follow CougPlace marketplace rules and campus safety guidelines.
              </label>
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-primary-custom">Create Seller Profile</button>
              <button type="button" class="btn btn-outline-secondary">Save for Later</button>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</main>

<footer class="py-4 text-center footer-custom">
  <div class="container">
    <p class="mb-0">© 2026 CougPlace</p>
  </div>
</footer>

</body>
</html>
