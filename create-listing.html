<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CougPlace - Create Listing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark custom-nav">
  <div class="container">
    <a class="navbar-brand fw-bold" href="marketplace.html">CougPlace</a>

    <div class="collapse navbar-collapse show">
      <ul class="navbar-nav ms-auto">
        <li class="nav-item"><a class="nav-link" href="marketplace.html">Marketplace</a></li>
        <li class="nav-item"><a class="nav-link active" href="create-listing.html">Create Listing</a></li>
        <li class="nav-item"><a class="nav-link" href="seller-dashboard.html">Seller Dashboard</a></li>
        <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
      </ul>
    </div>
  </div>
</nav>

<main class="container my-5">
  <div class="row justify-content-center">
    <div class="col-lg-8">
      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h2 class="fw-bold mb-4">Create New Listing</h2>

          <form>
            <div class="mb-3">
              <label class="form-label">Item Title</label>
              <input type="text" class="form-control" placeholder="Ex: TI-84 Calculator">
            </div>

            <div class="mb-3">
              <label class="form-label">Description</label>
              <textarea class="form-control" rows="4" placeholder="Describe the condition and details of the item"></textarea>
            </div>

            <div class="row">
              <div class="col-md-6 mb-3">
                <label class="form-label">Category</label>
                <select class="form-select">
                  <option selected>Select a category</option>
                  <option>Books</option>
                  <option>Electronics</option>
                  <option>School Supplies</option>
                  <option>Dorm Supplies</option>
                  <option>Other</option>
                </select>
              </div>

              <div class="col-md-6 mb-3">
                <label class="form-label">Price</label>
                <input type="number" class="form-control" placeholder="Ex: 70">
              </div>
            </div>

            <div class="mb-3">
              <label class="form-label">Pickup Area</label>
              <input type="text" class="form-control" placeholder="Ex: CUB, Library, Dorm Lobby">
            </div>

            <div class="mb-3">
              <label class="form-label">Upload Image</label>
              <input type="file" class="form-control">
            </div>

            <div class="mb-3">
              <label class="form-label">Listing Status</label>
              <select class="form-select">
                <option>Publish Now</option>
                <option>Save as Draft</option>
              </select>
            </div>

            <div class="d-flex gap-2 mt-4">
              <button type="submit" class="btn btn-primary-custom">Post Listing</button>
              <button type="button" class="btn btn-outline-secondary">Save Draft</button>
              <a href="seller-dashboard.html" class="btn btn-outline-danger">Cancel</a>
            </div>
          </form>

        </div>
      </div>
    </div>
  </div>
</main>

<footer class="py-4 text-center footer-custom">
  <div class="container">
    <p class="mb-0">© 2026 CougPlace</p>
  </div>
</footer>

</body>
</html>
