<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Manage Content - Admin</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
        <div class="container-fluid">
            <a class="navbar-brand" href="#">CougPlace</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Dashboard</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container">
        <h1 class="mb-3">Manage Content</h1>
        <p class="lead">Current flagged/Reported listings.</p>

        <!-- Table of flagged listings -->
        <table class="table table-hover">
            <thead class="table-dark"> <!-- Table header  -->
                <tr>
                    <th scope="col">Listing ID</th>
                    <th scope="col">Title</th>
                    <th scope="col">Seller</th>
                    <th scope="col">Flag Reason</th>
                    <th scope="col">Date Reported</th>
                    <th scope="col">Actions</th>
                </tr>
            </thead>
            <tbody> <!-- Table body with example data to show how it will run -->
                <tr>
                    <td>101</td>
                    <td>Used Textbook</td>
                    <td>Andres1</td>
                    <td>Prohibited Item</td>
                    <td>2026-03-05</td>
                    <td>
                        <!-- Approve is to say hey nothings wrong  -->
                        <button class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#actionModal" data-action="Approve" data-listing="101">Approve</button>
                        <!-- Remove is to say hey this listing is not allowed and remove it from the site -->
                        <button class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#actionModal" data-action="Remove" data-listing="101">Remove</button>
                    </td>
                </tr>
                <tr>
                    <td>102</td>
                    <td>Old Laptop</td>
                    <td>Andres2</td>
                    <td>Spam</td>
                    <td>2026-03-06</td>
                    <td>
                        <button class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#actionModal" data-action="Approve" data-listing="102">Approve</button>
                        <button class="btn btn-secondary btn-sm" data-bs-toggle="modal" data-bs-target="#actionModal" data-action="Remove" data-listing="102">Remove</button>
                    </td>
                </tr>
                <!-- More rows as needed -->
            </tbody>
        </table>
    </div>

    <!-- IN THE FUTURE A MODAL WILL BE ADDED HERE TO APPROVE OR REMOVE LISTINGS -->
    

    <!-- Bootstrap JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    
</body>
</html>
