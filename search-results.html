<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CougPlace - Search Results</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="marketplace.html">CougPlace</a>
      <div class="collapse navbar-collapse show">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="marketplace.html">Marketplace</a></li>
          <li class="nav-item"><a class="nav-link active" href="search-results.html">Search Results</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="mb-4">
      <h1 class="fw-bold">Search Results</h1>
      <p class="text-muted">Showing results for: <strong>calculator</strong></p>
    </div>

    <div class="row mb-4 g-3">
      <div class="col-md-4">
        <input type="text" class="form-control" value="calculator">
      </div>
      <div class="col-md-3">
        <select class="form-select">
          <option selected>All Categories</option>
          <option>School Supplies</option>
          <option>Electronics</option>
          <option>Textbooks</option>
        </select>
      </div>
      <div class="col-md-3">
        <select class="form-select">
          <option selected>Sort By</option>
          <option>Price Low to High</option>
          <option>Price High to Low</option>
          <option>Newest</option>
        </select>
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary-custom w-100">Apply</button>
      </div>
    </div>

    <div class="row g-4">
      <div class="col-md-6">
        <div class="card listing-card h-100">
          <div class="row g-0">
            <div class="col-md-4">
              <img src="https://via.placeholder.com/300x250" class="img-fluid rounded-start h-100 object-fit-cover" alt="TI-84 Plus">
            </div>
            <div class="col-md-8">
              <div class="card-body">
                <h5 class="card-title">TI-84 Plus Calculator</h5>
                <p class="card-text text-muted">Used for one semester, works perfectly.</p>
                <p class="price">$65</p>
                <a href="item-details.html" class="btn btn-primary-custom">View Details</a>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="col-md-6">
        <div class="card listing-card h-100">
          <div class="row g-0">
            <div class="col-md-4">
              <img src="https://via.placeholder.com/300x250" class="img-fluid rounded-start h-100 object-fit-cover" alt="Scientific Calculator">
            </div>
            <div class="col-md-8">
              <div class="card-body">
                <h5 class="card-title">Scientific Calculator</h5>
                <p class="card-text text-muted">Affordable and good for entry-level math courses.</p>
                <p class="price">$20</p>
                <a href="item-details.html" class="btn btn-primary-custom">View Details</a>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 text-center footer-custom">
    <div class="container">
      <p class="mb-0">© 2026 CougPlace</p>
    </div>
  </footer>
</body>
</html>
