<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CougPlace - Report Listing</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <nav class="navbar navbar-expand-lg navbar-dark custom-nav">
    <div class="container">
      <a class="navbar-brand fw-bold" href="marketplace.html">CougPlace</a>
      <div class="collapse navbar-collapse show">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="marketplace.html">Marketplace</a></li>
          <li class="nav-item"><a class="nav-link" href="search-results.html">Search Results</a></li>
          <li class="nav-item"><a class="nav-link" href="profile.html">Profile</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <main class="container my-5">
    <div class="row justify-content-center">
      <div class="col-lg-8">
        <div class="card shadow-sm border-0">
          <div class="card-body p-4">
            <h1 class="fw-bold mb-3">Report Listing</h1>
            <p class="text-muted">
              Use this form to report suspicious, misleading, or inappropriate listings.
            </p>

            <form>
              <div class="mb-3">
                <label for="listingName" class="form-label">Listing</label>
                <input type="text" class="form-control" id="listingName" value="TI-84 Calculator" readonly>
              </div>

              <div class="mb-3">
                <label for="reason" class="form-label">Reason for Report</label>
                <select class="form-select" id="reason">
                  <option selected>Select a reason</option>
                  <option>Inappropriate content</option>
                  <option>Spam or scam</option>
                  <option>Misleading description</option>
                  <option>Prohibited item</option>
                  <option>Other</option>
                </select>
              </div>

              <div class="mb-3">
                <label for="details" class="form-label">Additional Details</label>
                <textarea class="form-control" id="details" rows="5" placeholder="Provide more details here..."></textarea>
              </div>

              <div class="d-flex gap-2">
                <button type="submit" class="btn btn-danger">Submit Report</button>
                <a href="item-details.html" class="btn btn-outline-secondary">Cancel</a>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer class="py-4 text-center footer-custom">
    <div class="container">
      <p class="mb-0">© 2026 CougPlace</p>
    </div>
  </footer>
</body>
</html>
